# Exp 2: Soft SIMP (p=1.5), no binarization, softer beta
# Rationale: With simp_p=3.0, matching soil stiffness (1.44e8 Pa) from cement
# (12.5e9 Pa) requires density ~0.25. But the Poisson ratio of SIMP material
# is locked to cement's (0.2) while soil has nu=0.25. Lower simp_p reduces
# the Poisson-ratio distortion at intermediate densities and gives the
# optimizer a smoother landscape.
# Beta=2.0 keeps the density field softer with better gradient flow.
# No regularization at all — pure cloaking objective.

is_reference: false
geometry_type: triangular

material:
  rho0: 1600.0
  cs: 300.0

domain:
  f_star: 2.0
  lambda_star: 1.0
  H_factor: 4.305
  W_factor: 12.5

geometry:
  a_factor: 0.0774
  b_factor: 3.0
  c_factor: 0.1545

absorbing:
  L_pml_factor: 1.0
  xi_max: 4.0
  pml_pow: 2

mesh:
  n_pml_x: 32
  n_pml_y: 32
  nx_phys: 50
  ny_phys: 50
  refinement_factor: 5
  ele_type: TRI3

source:
  x_src_factor: 0.05
  sigma_factor: 0.01
  F0: 1.0

solver:
  ksp_type: preonly
  pc_type: lu

cells:
  enabled: true
  n_x: 10
  n_y: 10
  n_C_params: 2
  symmetrize_init: true

loss:
  tol: 3e-2

optimization:
  method: neural_topo
  n_iters: 500
  lr: 0.005
  lr_end: 0.002
  lambda_l2: 0.0
  lambda_neighbor: 0.0
  plot_every: 10
  topo_neural:
    hidden_size: 256
    n_layers: 4
    n_fourier: 32
    seed: 42
    pixel_per_cell: 25
    simp_p: 1.5
    E_cement: 30.0e9
    nu_micro: 0.2
    rho_cement: 2300.0
    lambda_bin: 0.0
    rho_weight: 0.0
    dataset_path: output/dataset_30k.h5
    output_scale: 2.0
    density_eps: 0.01
    beta_start: 2.0
    beta_end: 2.0
    fourier_sigma: 100.0
    init_mode: direct

output_dir: output/topo4_soft_simp
