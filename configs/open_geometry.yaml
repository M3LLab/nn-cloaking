# Open-geometry cloak optimisation: joint shape + material on a fixed cell grid.
#
# Shape is a trainable per-cell logit; mask = sigmoid(beta * logit) blends the
# trainable cell material toward the isotropic background.  Initialised from
# the triangular cloak, then free to evolve.
#
# Usage:
#   python run_optimize_open_geometry.py configs/open_geometry.yaml

is_reference: false
geometry_type: triangular

material:
  rho0: 1600.0
  cs: 300.0

domain:
  f_star: 2.0
  lambda_star: 1.0
  H_factor: 4.305
  W_factor: 12.5

geometry:
  a_factor: 0.0774
  b_factor: 3.0
  c_factor: 0.1545

absorbing:
  L_pml_factor: 1.0
  xi_max: 4.0
  pml_pow: 2

mesh:
  n_pml_x: 32
  n_pml_y: 32
  nx_phys: 50
  ny_phys: 30
  refinement_factor: 4
  ele_type: TRI3

source:
  x_src_factor: 0.05
  sigma_factor: 0.01
  F0: 1.0

solver:
  ksp_type: preonly
  pc_type: lu

cells:
  enabled: true
  n_x: 50
  n_y: 50
  n_C_params: 6

loss:
  type: top_surface          # was right_boundary — must match the eval surface
                             # used by scripts/frequency_sweep.py

optimization:
  method: raw          # unused here; open-geometry has its own loop
  n_iters: 2000        # was 500 — loss curve was still falling at step 500
  lr: 0.5
  lambda_l2: 0.0       # was 0.001 — anchored to analytical-cloak material;
                       # actively un-cloaks cells the mask evicts
  lambda_neighbor: 0.001
  plot_every: 100
  init_params: ""      # warm-start .npz; may include shape_logits

# Open-geometry extras.  Read directly by rayleigh_cloak/open_geometry.py —
# ignored by SimulationConfig.
shape_opt:
  # Sigmoid sharpness.  With beta_end set, β ramps linearly from `beta` to
  # `beta_end` across n_iters — β-continuation is the standard way to get
  # crisp masks without killing gradients early.
  beta: 1.0
  beta_end: 8.0          # was null — anneal toward binary; binarisation/mask-TV
                         # were flat in the previous run
  init_magnitude: 3.0    # |logit| at init (sigmoid(3) ≈ 0.95)
  logits_lr_mult: 0.1    # was 1.0 — Adam(lr=0.5) on logits caused mask thrash
                         # (solid_frac swung 0.33→0.86 in the previous run)
  # Regularisers / penalties
  lambda_mask_smooth: 1.0e-3   # was 1.0e-2 — TV was flat-large, locking topology
  lambda_bin: 1.0e-3           # was 0.0 — works with simp_p>1 to drive m to {0,1}
  # Shape-side tricks (topology-opt classics)
  simp_p: 3.0                  # was 1.0 — SIMP penalises grey
  smooth_sigma: 0.0            # Gaussian filter σ (cells) on logits; 1-2 suppresses islands
  # Output
  plot_mask_every: 25          # 0 = disabled
  project_final: true          # save largest-CC "manufacturable" mask at the end
  project_connectivity: 1      # 1 = 4-connected, 2 = 8-connected
  # Early stop: run *at least* `optimization.n_iters` (= 2000) steps; after
  # that, keep going until the total loss has not improved in `patience`
  # consecutive steps (or `max_iters` is hit).  patience: 0 disables.
  patience: 10
  max_iters: 5000              # null = uncapped
  improvement_tol: 0.0         # any strict decrease counts as improvement

output_dir: output/open_geometry
